services:
  fastapi-backend:
    build:
      context: ./fastapi-backend
      dockerfile: Dockerfile
    container_name: causal-fastapi-backend
    ports:
      - "${FASTAPI_PORT:-8000}:8000"
    environment:
      MODEL_ARTIFACT_PATH: /app/models/best_deconfounded_model.joblib
      NORMALIZATION_SETTINGS_PATH: /app/models/initial_eda_normalization_settings.json
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:5173,http://127.0.0.1:5173}"
      INFERENCE_CACHE_SIZE: "${INFERENCE_CACHE_SIZE:-512}"
    restart: unless-stopped

  spring-backend:
    build:
      context: ./spring-backend
      dockerfile: Dockerfile
    container_name: causal-spring-backend
    ports:
      - "${SPRING_PORT:-8080}:8080"
    environment:
      CRUD_API_PORT: 8080
      SUPABASE_URL: "${SUPABASE_URL:?SUPABASE_URL is required}"
      SUPABASE_ANON_KEY: "${SUPABASE_ANON_KEY:?SUPABASE_ANON_KEY is required}"
      SUPABASE_RESULTS_TABLE: "${SUPABASE_RESULTS_TABLE:-prediction_results}"
      SUPABASE_RISK_SETTINGS_TABLE: "${SUPABASE_RISK_SETTINGS_TABLE:-risk_classification_settings}"
      AUTH_COOKIE_NAME: "${AUTH_COOKIE_NAME:-cb_auth_token}"
      AUTH_COOKIE_SECURE: "${AUTH_COOKIE_SECURE:-false}"
      AUTH_COOKIE_SAMESITE: "${AUTH_COOKIE_SAMESITE:-Lax}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:5173,http://127.0.0.1:5173}"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: causal-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - fastapi-backend
      - spring-backend
    restart: unless-stopped
