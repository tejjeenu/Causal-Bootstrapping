services:
  fastapi-backend:
    build:
      context: ./fastapi-backend
      dockerfile: Dockerfile
    container_name: causal-fastapi-backend
    ports:
      - "${FASTAPI_PORT:-8000}:8000"
    environment:
      MODEL_ARTIFACT_PATH: /app/models/best_deconfounded_model.joblib
      NORMALIZATION_SETTINGS_PATH: /app/models/initial_eda_normalization_settings.json
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:5173,http://127.0.0.1:5173}"
      INFERENCE_CACHE_SIZE: "${INFERENCE_CACHE_SIZE:-512}"
    restart: unless-stopped

  spring-backend:
    build:
      context: ./spring-backend
      dockerfile: Dockerfile
    container_name: causal-spring-backend
    env_file:
      - ./spring-backend/.env
    ports:
      - "${SPRING_PORT:-8080}:8080"
    environment:
      CRUD_API_PORT: 8080
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:5173,http://127.0.0.1:5173}"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: causal-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - fastapi-backend
      - spring-backend
    restart: unless-stopped
